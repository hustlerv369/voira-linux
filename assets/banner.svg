<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Voira — mluv a piš, česká voice-to-text appka pro Linux">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141011"/>
      <stop offset="0.55" stop-color="#0D0B0C"/>
      <stop offset="1" stop-color="#080607"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#E11D2A" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#E11D2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF3B47"/>
      <stop offset="1" stop-color="#C81E2B"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5A64"/>
      <stop offset="1" stop-color="#C81E2B"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="0" fill="url(#bg)"/>
  <ellipse cx="170" cy="150" rx="520" ry="360" fill="url(#glow)"/>
  <rect width="1280" height="360" fill="none" stroke="#2a2122" stroke-width="2"/>

  <!-- logo mark: rounded square + V + 3 pulse dots (matches favicon) -->
  <g transform="translate(96,108)">
    <rect width="144" height="144" rx="33" fill="url(#mark)"/>
    <rect width="144" height="144" rx="33" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="61.5" cy="39" r="5.1" fill="#fff"/>
    <circle cx="72" cy="36.6" r="6.6" fill="#fff"/>
    <circle cx="82.5" cy="39" r="5.1" fill="#fff"/>
    <path d="M43.5 54 L72 105 L100.5 54" fill="none" stroke="#fff" stroke-width="16.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <g fill="#ffffff" font-family="'Segoe UI', 'Helvetica Neue', Arial, system-ui, sans-serif">
    <text x="280" y="158" font-size="92" font-weight="800" letter-spacing="-2">Voira</text>
    <text x="284" y="212" font-size="31" font-weight="500" fill="#E6DADA">Mluv a piš — česká voice-to-text appka</text>
    <text x="284" y="262" font-size="25" font-weight="600" fill="#FF5A64">pro Linux · Windows · macOS</text>
    <text x="284" y="312" font-size="20" font-weight="500" fill="#9b9092" letter-spacing="1.5">AppImage&#160;&#160;·&#160;&#160;.deb&#160;&#160;·&#160;&#160;.rpm&#160;&#160;·&#160;&#160;AUR</text>
  </g>

  <!-- waveform accent (the voice dock motif) -->
  <g transform="translate(980,180)">
    <rect x="0"   y="-22"  width="11" height="44"  rx="5.5" fill="url(#bar)" fill-opacity="0.55"/>
    <rect x="26"  y="-46"  width="11" height="92"  rx="5.5" fill="url(#bar)" fill-opacity="0.7"/>
    <rect x="52"  y="-78"  width="11" height="156" rx="5.5" fill="url(#bar)"/>
    <rect x="78"  y="-58"  width="11" height="116" rx="5.5" fill="url(#bar)" fill-opacity="0.85"/>
    <rect x="104" y="-96"  width="11" height="192" rx="5.5" fill="url(#bar)"/>
    <rect x="130" y="-40"  width="11" height="80"  rx="5.5" fill="url(#bar)" fill-opacity="0.7"/>
    <rect x="156" y="-66"  width="11" height="132" rx="5.5" fill="url(#bar)" fill-opacity="0.9"/>
    <rect x="182" y="-30"  width="11" height="60"  rx="5.5" fill="url(#bar)" fill-opacity="0.6"/>
    <rect x="208" y="-50"  width="11" height="100" rx="5.5" fill="url(#bar)" fill-opacity="0.78"/>
  </g>
</svg>
